<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Text to Speech | ALPHACODE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="speech-card">
    <div class="app-header">
        <div class="title-section">
            <h1>
                <i class="fas fa-head-side-vr"></i> 
                Text to Speech
            </h1>
            <p>Natural voice synthesis · Zero echo</p>
        </div>
        <div class="voice-selector">
            <label><i class="fas fa-microphone-alt"></i> Voice</label>
            <select id="voiceSelect"></select>
        </div>
    </div>

    <div class="main-content">
        <div class="textarea-container">
            <textarea id="textInput" placeholder="Write or paste your text here... (max 3000 characters)"></textarea>
        </div>
        <div class="info-row">
            <div class="char-counter">
                <i class="far fa-keyboard"></i> Characters: <span id="charCount">0</span> / 3000
            </div>
            <div class="char-counter">
                <i class="fas fa-waveform"></i> Web Speech API
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="speakBtn">
                <i class="fas fa-play"></i> Speak
            </button>
            <button class="btn btn-outline" id="pauseBtn">
                <i class="fas fa-pause"></i> Pause
            </button>
            <button class="btn btn-outline" id="resumeBtn">
                <i class="fas fa-play-circle"></i> Resume
            </button>
            <button class="btn btn-danger" id="stopBtn">
                <i class="fas fa-stop"></i> Stop
            </button>
            <button class="btn btn-outline" id="clearBtn">
                <i class="fas fa-trash-alt"></i> Clear
            </button>
        </div>

        <div class="status-area">
            <div class="speech-status">
                <i class="fas fa-circle-info"></i>
                <span id="statusMsg">Ready — type text and press Speak</span>
            </div>
            <div class="rate-control">
                <label><i class="fas fa-gauge-high"></i> Speed</label>
                <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.05" value="1.0">
                <span id="rateValue">1.0x</span>
            </div>
        </div>
    </div>

    <div class="app-footer">
        Powered by <a href="https://anthonyke.netlify.app/" target="_blank" rel="noopener noreferrer"><i class="fas fa-crown"></i> ALPHACODE</a> leading to innovation
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
